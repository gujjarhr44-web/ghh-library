name: EAS Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/ghh-library/**'
      - '.github/workflows/eas-build.yml'
  # Manual trigger bhi allowed
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build Profile (preview=APK, production=AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 📂 Install Root Workspace Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔧 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗️ Run EAS Build (APK)
        id: eas-build
        run: |
          cd artifacts/ghh-library
          BUILD_PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building with profile: $BUILD_PROFILE"
          npx eas-cli build \
            --platform android \
            --profile $BUILD_PROFILE \
            --non-interactive \
            --json \
            --no-wait | tee /tmp/build-output.json
          echo "Build submitted! Check Expo dashboard for status."

      - name: 📢 Build Info
        run: |
          echo "✅ EAS Build submitted successfully!"
          echo "🔗 Check build status: https://expo.dev/accounts/[your-username]/projects/ghh-library/builds"
          echo "📥 Download APK from Expo dashboard once build completes"
          echo ""
          echo "After downloading APK:"
          echo "  1. Copy to: artifacts/admin-dashboard/public/ghh-library.apk"
          echo "  2. Create GitHub Release with the APK attached"
