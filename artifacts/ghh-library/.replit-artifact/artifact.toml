kind = "mobile"
previewPath = "/"
title = "GHH Library"
version = "1.0.0"
id = "artifacts/ghh-library"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20268

[services.development]
run = "pnpm --filter @workspace/ghh-library run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ghh-library", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ghh-library", "run", "serve" ]

[services.env]
PORT = "20268"
BASE_PATH = "/"
